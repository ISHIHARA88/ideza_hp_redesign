<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | I.DEZA</title>
  <!-- Premium Luxury Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="blobs-wrapper">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
  </div>

  <nav class="glass-nav">
    <div class="nav-container">
      <div class="nav-logo" style="display:flex; align-items:center; gap:8px;">
        <a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center;">
          <img src="https://storage.googleapis.com/studio-design-asset-files/projects/VGOKXyjNqn/s-106x110_webp_85173c89-77a0-4677-9470-a8211ba41709.webp" alt="ID Logo" style="height: 28px; width: auto;">
        </a>
      </div>
      <a href="index.html" class="btn-secondary nav-cta">← 戻る</a>
    </div>
  </nav>

  <main style="padding-top: 180px; padding-bottom: 120px;">
    <div class="container">
      <div class="section-header" style="margin-bottom: 60px;">
        <h1 class="hero-title" style="font-size: 40px;">お問い合わせ</h1>
        <p class="section-subtitle">お見積りやご相談など、お気軽にご連絡ください。<br>通常2営業日以内にご返信いたします。</p>
      </div>

      <div class="form-container reveal active">
        <form action="https://formsubmit.co/ryoya3361@gmail.com" method="POST">
          <!-- Formsubmit settings -->
          <input type="hidden" name="_subject" value="【I.DEZA Portfolio】サイトから新しいお問い合わせが届きました">
          <input type="hidden" name="_template" value="table">
          
          <div class="form-group">
            <label for="name">お名前 <span style="color:var(--enciera-orange); font-size:12px;">必須</span></label>
            <input type="text" id="name" name="name" placeholder="山田 太郎" required>
          </div>

          <div class="form-group">
            <label for="company">貴社名</label>
            <input type="text" id="company" name="company" placeholder="株式会社〇〇">
          </div>

          <div class="form-group">
            <label for="email">メールアドレス <span style="color:var(--enciera-orange); font-size:12px;">必須</span></label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
          </div>

          <div class="form-group">
            <label for="interest">ご相談内容 <span style="color:var(--enciera-orange); font-size:12px;">必須</span></label>
            <select id="interest" name="interest" style="width:100%; padding: 16px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 16px; background: #fff;" required>
              <option value="">選択してください</option>
              <option value="lp">ランディングページ制作</option>
              <option value="website">Webサイト制作</option>
              <option value="banner">バナー・画像制作</option>
              <option value="other">その他・お見積り</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">詳細・備考 <span style="color:var(--enciera-orange); font-size:12px;">必須</span></label>
            <textarea id="message" name="message" rows="6" placeholder="具体的なご要望や現状の課題などをご記入ください。" required></textarea>
          </div>

          <div style="text-align: center; margin-top: 40px;">
            <button type="submit" class="btn-primary large">送信する</button>
          </div>

        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 i.DEZA portfolio | WebDesigner JUNYA ISHIHARA. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
